syntax = "proto3";

package spot.v1;

option go_package = "exchange-system/spot-service/proto/spot/v1";

import "google/protobuf/timestamp.proto";
import "common/common.proto";

message Market {
  string id = 1;
  string symbol = 2;
  string base_currency = 3;
  string quote_currency = 4;
  bool enabled = 5;
  google.protobuf.Timestamp deleted_at = 6;
  string min_order_size = 7;
  string max_order_size = 8;
  string price_increment = 9;
  string size_increment = 10;

  repeated string allowed_roles = 11;
}

message ViewMarketsRequest {
  repeated string user_roles = 1;
}

message ViewMarketsResponse {
  repeated Market markets = 1;
  common.PageInfo page_info = 2;
}

message GetMarketRequest {
  string market_id = 1;
}

message GetMarketResponse {
  Market market = 1;
}

service SpotInstrumentService {
  rpc ViewMarkets(ViewMarketsRequest) returns (ViewMarketsResponse);
  rpc GetMarket(GetMarketRequest) returns (GetMarketResponse);
}