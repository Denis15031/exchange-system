syntax = "proto3";
package spot.v1;

option go_package = "exchange-system/proto/spot/v1";
import "common/common.proto";
import "user/v1/user.proto";

message Market {
  string market_id = 1;
  string symbol = 2;
  string base_currency = 3;
  string quote_currency = 4;
  bool enabled = 5;
  string min_order_size = 6;
  string max_order_size = 7;
  string price_increment = 8;
  string size_increment = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
  int64 deleted_at = 12;
}

message ViewMarketsRequest {
  repeated user.v1.UserRole user_roles = 1;
}

message ViewMarketsResponse {
  repeated Market markets = 1;
}

message GetMarketRequest {
  string market_id = 1;
}

message GetMarketResponse {
  Market market = 1;
}

service SpotInstrumentService {
  rpc ViewMarkets(ViewMarketsRequest) returns (ViewMarketsResponse);
  rpc GetMarket(GetMarketRequest) returns (GetMarketResponse);
}